version: "3.8"

services:
  frontend:
    build:
      context: ./apps/web
    container_name: lucid_frontend
    ports:
      - "3000:3000"
    depends_on:
      - api

  api:
    build:
      context: ./apps/api
    container_name: lucid_api_node
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai-service:
    build:
      context: ./apps/ai-service
      dockerfile: Dockerfile
    container_name: lucid_api_python
    ports:
      - "8000:8000"
    env_file:
      - ./apps/ai-service/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://lucid_admin:lucid_secure_password@db:5432/lucid_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - QDRANT_HOST=qdrant
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  celery_worker:
    build:
      context: ./apps/ai-service
      dockerfile: Dockerfile
    container_name: lucid_celery_worker
    command: celery -A app.workers.tasks worker --loglevel=info
    env_file:
      - ./apps/ai-service/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://lucid_admin:lucid_secure_password@db:5432/lucid_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - QDRANT_HOST=qdrant
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    container_name: lucid_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: lucid_admin
      POSTGRES_PASSWORD: lucid_secure_password
      POSTGRES_DB: lucid_db
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lucid_admin -d lucid_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lucid_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: lucid_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: lucid_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  redis_data:
  rabbitmq_data:
  qdrant_data:
